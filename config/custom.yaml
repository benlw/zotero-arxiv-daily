zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.163.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: deepseek-ai/DeepSeek-V3.2

source:
  arxiv:
    category: null
    required_categories: ["math.OC", "eess.SY", "cs.RO", "cs.LG", "cs.MA", "math.DS", "math.DG"]
    interest_profile: "My research focuses on structure-preserving numerical integrators, controlled Lagrangian methods for nonlinear and infinite-dimensional systems, and geometric modeling for practical stabilization problems. Computational geometric mechanics and control (modeling and control of flexible multibody dynamic systems); soft robotics; Physics-informed learning; flexible swarms (multi-agent reinforcement learning)."

executor:
  debug: ${oc.env:DEBUG,null}
  auto_category_from_zotero: true
  extract_full_text: true
  full_text_source: html
  # Top-K papers use full-text deep summary (TL;DR + Q1 + Q2).
  # Others use abstract-only short TL;DR.
  deep_fulltext_top_k: 5
  source: ['arxiv']
